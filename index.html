<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wishlist</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<div class="container">

<h1>💝 Wishlist for Mo</h1>

<form id="form">

<input id="name" placeholder="Item name" required>
<input id="price" type="number" placeholder="Price (k VND)">
<input id="link" placeholder="Product link">
<input id="image" placeholder="Image URL (optional)">

<label class="upload-btn">
Upload Image
<input type="file" id="imageUpload" accept="image/*">
</label>

<img id="preview" class="preview" style="display:none;">

<div class="rating">
<span class="star" data-value="1">★</span>
<span class="star" data-value="2">★</span>
<span class="star" data-value="3">★</span>
<span class="star" data-value="4">★</span>
<span class="star" data-value="5">★</span>
</div>

<input type="hidden" id="desire" value="3">

<button>Add Item</button>

</form>

<div id="list-section">

<div class="controls">

<label>Sort by:</label>

<select id="sortField">
<option value="desire">Desire</option>
<option value="price">Price</option>
</select>

<select id="sortDirection">
<option value="desc">Descending</option>
<option value="asc">Ascending</option>
</select>

<button id="sortBtn">Sort</button>

</div>

<h2>Wishlist</h2>
<div id="list"></div>

<h2>Purchased</h2>
<div id="boughtList"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
