<!DOCTYPE html>

<option value="2">⭐⭐</option>

<option value="5">⭐⭐⭐⭐⭐</option>
</select>

<button>Add Item</button>

</form>

<div id="list"></div>

</div>

<script src="script.js"></script>

</body>
</html>
